<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El Ansia — Cáscara Archivo</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400;1,600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    #naranja-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    body.project-page > * {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body class="project-page">

  <canvas id="naranja-canvas"></canvas>

  <header>
    <div class="header-left">
      <a href="video.html" class="back-link">← Cáscara Archivo</a>
    </div>
    <nav class="header-right">
      <a href="archivo.html" class="nav-link">Imágenes</a>
      <a href="video.html" class="nav-link active">Video</a>
      <a href="sobre.html" class="nav-link">Sobre mí</a>
    </nav>
  </header>

  <section class="project-hero">
    <h1 class="project-name">El Ansia</h1>
  </section>

  <section class="project-images">
    <div class="video-embed reveal">
      <iframe
        src="https://www.youtube.com/embed/M-peNIcCuXM"
        title="El Ansia — Cáscara"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </section>

  <section class="project-ficha reveal">
    <div class="ficha-grid">
      <div class="ficha-item">
        <span class="ficha-label">Año</span>
        <span class="ficha-value">2024</span>
        <span class="ficha-label">Con</span>
        <span class="ficha-value">Mark Vigil</span>
        <span class="ficha-label">Equipo Técnico</span>
        <span class="ficha-value">dirección Briana Turi sonido Luna Gorojovsky</span>
      </div>
    </div>
  </section>

  <footer>
    <span>© Cáscara</span>
    <a href="https://www.cascara.com.ar" target="_blank" class="footer-tienda">Tienda</a>
    <span>Buenos Aires</span>
  </footer>

  <script src="js/main.js"></script>
  <script>
    const canvas = document.getElementById('naranja-canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = 'https://res.cloudinary.com/dsppfoxzs/image/upload/v1781640089/orange-1218158_1280_vlnwcy.webp';

    const naranjas = Array.from({length: 14}, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * -window.innerHeight,
      size: 30 + Math.random() * 40,
      speed: 0.8 + Math.random() * 1.2,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.015
    }));

    img.onload = () => {
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        naranjas.forEach(n => {
          ctx.save();
          ctx.globalAlpha = 0.3;
          ctx.translate(n.x, n.y);
          ctx.rotate(n.rot);
          ctx.drawImage(img, -n.size, -n.size, n.size * 2, n.size * 2);
          ctx.restore();

          n.y += n.speed;
          n.rot += n.rotSpeed;
          if (n.y > canvas.height + n.size * 2) {
            n.y = -n.size * 2;
            n.x = Math.random() * canvas.width;
          }
        });

        requestAnimationFrame(animate);
      }
      animate();
    };

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
